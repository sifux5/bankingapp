spring:
  application:
    name: BankingApp

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/bankingapp
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080