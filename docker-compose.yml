version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: bankingapp-db
    environment:
      POSTGRES_DB: bankingapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - bankingapp_data:/var/lib/postgresql/data

volumes:
  bankingapp_data: